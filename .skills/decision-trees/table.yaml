---
resource: "table"
description: "Decision tree for table operations: list, find, describe, read"
intents:
  list:
    parse:
      lib: "$lib"
    resolve:
      server:
        rules:
          - match: { lib: [Casuser, Formats, ModelPerformanceData, Models, Public, Samples, SystemData] }
            value: "cas"
          - match: { lib: [MAPS, MAPSGFK, MAPSSAS, SASDQREF, SASHELP, SASUSER, WORK] }
            value: "sas"
        default:
          strategy: "try-in-order"
          values: ["cas", "sas"]
    exec:
      tool: "sas-score-list-tables"
      args:
        lib: "$lib"
        server: "$server"
        start: 1
        limit: 10
    format: "list of tables"
  find:
    parse:
      lib: "$lib"
      name: "$name"
    resolve:
      server:
        rules:
          - match: { lib: [Casuser, Formats, ModelPerformanceData, Models, Public, Samples, SystemData] }
            value: "cas"
          - match: { lib: [MAPS, MAPSGFK, MAPSSAS, SASDQREF, SASHELP, SASUSER, WORK] }
            value: "sas"
        default:
          strategy: "try-in-order"
          values: ["cas", "sas"]
    exec:
      tool: "sas-score-find-table"
      args:
        lib: "$lib"
        name: "$name"
        server: "$server"
    format: "find response"
  describe:
    parse:
      lib: "$lib"
      table: "$table"
    resolve:
      server:
        rules:
          - match: { lib: [Casuser, Formats, ModelPerformanceData, Models, Public, Samples, SystemData] }
            value: "cas"
          - match: { lib: [MAPS, MAPSGFK, MAPSSAS, SASDQREF, SASHELP, SASUSER, WORK] }
            value: "sas"
        default:
          strategy: "try-in-order"
          values: ["cas", "sas"]
    verify:
      tool: "sas-score-find-table"
      args:
        lib: "$lib"
        name: "$table"
        server: "$server"
    exec:
      tool: "sas-score-table-describe"
      args:
        lib: "$lib"
        table: "$table"
        server: "$server"
    format: "table schema and column metadata"
  read:
    parse:
      lib: "$lib"
      table: "$table"
      where: "$where"
      aggregation_requested: "$aggregation_requested"   # boolean inferred from request
      aggregation_query: "$aggregation_query"
    resolve:
      server:
        rules:
          - match: { lib: [Casuser, Formats, ModelPerformanceData, Models, Public, Samples, SystemData] }
            value: "cas"
          - match: { lib: [MAPS, MAPSGFK, MAPSSAS, SASDQREF, SASHELP, SASUSER, WORK] }
            value: "sas"
        default:
          strategy: "try-in-order"
          values: ["cas", "sas"]
    verify:
      tool: "sas-score-find-table"
      args:
        lib: "$lib"
        name: "$table"
        server: "$server"
    decision:
      - condition: "aggregation_requested == true"
        exec:
          tool: "sas-score-sas-query"
          args:
            table: "$lib.$table"
            query: "$aggregation_query"
      - condition: "default"
        exec:
          tool: "sas-score-read-table"
          args:
            lib: "$lib"
            table: "$table"
            server: "$server"
            where: "$where"
    format: "rows or aggregated result"
