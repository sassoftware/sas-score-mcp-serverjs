---
resource: "table"
description: "Decision tree for table operations: list, find, describe, read"
intents:
  list:
    parse:
      lib: "$lib"
    exec:
      tool: "sas-score-list-tables"
      args:
        lib: "$lib"
        start: 1
        limit: 10
    format: "list of tables"
  find:
    parse:
      lib: "$lib"
      name: "$name"
    exec:
      tool: "sas-score-find-table"
      args:
        lib: "$lib"
        name: "$name"
    format: "find response"
  describe:
    parse:
      lib: "$lib"
      table: "$table"
      server: "$server"
    verify:
      tool: "sas-score-find-table"
      args:
        lib: "$lib"
        name: "$table"
    exec:
      tool: "sas-score-table-describe"
      args:
        lib: "$lib"
        table: "$table"
        server: "$server"
    format: "table schema and column metadata"
  read:
    parse:
      lib: "$lib"
      table: "$table"
      where: "$where"
      aggregation_requested: "$aggregation_requested" # boolean inferred from request
      aggregation_query: "$aggregation_query"
    verify:
      tool: "sas-score-find-table"
      args:
        lib: "$lib"
        name: "$table"
    decision:
      - condition: "aggregation_requested == true"
        exec:
          tool: "sas-score-sas-query"
          args:
            table: "$lib.$table"
            query: "$aggregation_query"
      - condition: "default"
        exec:
          tool: "sas-score-read-table"
          args:
            lib: "$lib"
            table: "$table"
            where: "$where"
    format: "rows or aggregated result"
