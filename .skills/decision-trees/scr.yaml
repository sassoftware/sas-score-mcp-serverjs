---
resource: "scr"
description: "Decision tree for SCR models: list, find, describe, score"
intents:
  list:
    exec:
      tool: "sas-score-list-scr"
      args:
        start: 1
        limit: 10
    format: "list of SCR models"
  find:
    parse:
      name: "$name"
    exec:
      tool: "sas-score-find-scr"
      args:
        name: "$name"
    format: "find response"
  describe:
    parse:
      name: "$name"
    exec:
      tool: "sas-score-scr-describe"
      args:
        name: "$name"
    format: "SCR name schema and metadata"
  score:
    parse:
      name: "$name"
      scenario: "$scenario"
    verify:
      tool: "sas-score-find-scr"
      args:
        name: "$name"
    exec:
      tool: "sas-score-scr-score"
      args:
        name: "$name"
        scenario: "$scenario"
    format: "merge prediction with input"

