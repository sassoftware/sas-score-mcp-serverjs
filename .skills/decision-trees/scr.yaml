---
resource: "scr"
description: "Decision tree for SCR (external) models. Skip pre-verification; require valid endpoint."
intents:
  score:
    parse:
      url: "$url"
      scenario: "$scenario"
    verify:
      skip: true
    exec:
      tool: "sas-score-scr-score"
      args:
        url: "$url"
        scenario: "$scenario"
    format: "merge prediction with input"
