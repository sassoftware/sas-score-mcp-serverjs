---
resource: "program"
description: "Decision tree for SAS program, CAS program, and macro model execution"
intents:
  score:
    parse:
      src: "$src"           # SAS code string or .sas filename
      folder: "$folder"     # server folder path when src is a filename
      scenario: "$scenario"
      output: "$output"     # table name to capture as output
      limit: "$limit"
    exec:
      tool: "sas-score-program-score"
      args:
        src: "$src"
        folder: "$folder"
        scenario: "$scenario"
        output: "$output"
        limit: "$limit"
    format: "log, ods output, and optional output table rows"
  score_cas:
    parse:
      src: "$src"           # CASL code or CAS action
      folder: "$folder"
      scenario: "$scenario"
      output: "$output"
      limit: "$limit"
    exec:
      tool: "sas-score-cas-program-score"
      args:
        src: "$src"
        folder: "$folder"
        scenario: "$scenario"
        output: "$output"
        limit: "$limit"
    format: "log output and CAS results, optional output table rows"
  macro_score:
    parse:
      macro: "$macro"       # macro name without leading %
      scenario: "$scenario" # key=value pairs or %let statements
    exec:
      tool: "sas-score-macro-score"
      args:
        macro: "$macro"
        scenario: "$scenario"
    format: "log, ods output, and tables created by macro"
