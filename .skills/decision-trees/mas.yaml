---
resource: "mas"
description: "Decision tree for MAS models: list, find, describe,score"
intents:
  list:
    exec:
      tool: "sas-score-list-mas"
      args:
        start: 1
        limit: 10
    format: "list of MAS models"
  find:
    parse:
      model: "$model"
    exec:
      tool: "sas-score-find-mas"
      args:
        name: "$model"
    format: "find response"
  describe:
    parse:
      model: "$model"
    verify:
      tool: "sas-score-find-mas"
      args:
        name: "$model"
    exec:
      tool: "sas-score-mas-describe"
      args:
        model: "$model"
    format: "MAS model metadata and schema"
  score:
    parse:
      model: "$model"
      scenario: "$scenario"
    verify:
      tool: "sas-score-find-mas"
      args:
        name: "$model"
    exec:
      tool: "sas-score-mas-score"
      args:
        model: "$model"
        scenario: "$scenario"
    format: "merge prediction with input"
