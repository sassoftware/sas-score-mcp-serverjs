---
resource: "library"
description: "Decision tree for library operations: list, find"
intents:
  list:
    parse:
      server: "$server"   # 'cas' | 'sas' | 'all' — inferred from request
    exec:
      tool: "sas-score-list-libraries"
      args:
        server: "$server"
        start: 1
        limit: 10
    format: "list of libraries"
  find:
    parse:
      name: "$name"
      server: "$server"   # 'cas' | 'sas' — default 'cas'
    exec:
      tool: "sas-score-find-library"
      args:
        name: "$name"
        server: "$server"
    format: "find response"
