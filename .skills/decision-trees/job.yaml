---
resource: "job"
description: "Decision tree for Job models: list, find, describe, score"
intents:
  list:
    exec:
      tool: "sas-score-list-jobs"
      args:
        start: 1
        limit: 10
    format: "list of job models"
  find:
    parse:
      name: "$name"
    exec:
      tool: "sas-score-find-job"
      args:
        name: "$name"
    format: "find response"
  describe:
    parse:
      name: "$name"
    verify:
      tool: "sas-score-find-job"
      args:
        name: "$name"
    exec:
      tool: "sas-score-job-describe"
      args:
        name: "$name"
    format: "job model metadata and schema"
  score:
    parse:
      name: "$name"
      scenario: "$scenario"
    verify:
      tool: "sas-score-find-job"
      args:
        name: "$name"
    exec:
      tool: "sas-score-job-score"
      args:
        name: "$name"
        scenario: "$scenario"
    format: "merge prediction with input"
