---
resource: "jobdef"
description: "Decision tree for JobDef models: list, find, describe, score"
intents:
  list:
    exec:
      tool: "sas-score-list-jobdefs"
      args:
        start: 1
        limit: 10
    format: "list of jobdef models"
  find:
    parse:
      name: "$name"
    exec:
      tool: "sas-score-find-jobdef"
      args:
        name: "$name"
    format: "find response"
  describe:
    parse:
      name: "$name"
    verify:
      tool: "sas-score-find-jobdef"
      args:
        name: "$name"
    exec:
      tool: "sas-score-jobdef-describe"
      args:
        name: "$name"
    format: "jobdef model metadata and schema"
  score:
    parse:
      name: "$name"
      scenario: "$scenario"
    verify:
      tool: "sas-score-find-jobdef"
      args:
        name: "$name"
    exec:
      tool: "sas-score-jobdef-score"
      args:
        name: "$name"
        scenario: "$scenario"
    format: "merge prediction with input"
