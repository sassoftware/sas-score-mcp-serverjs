---
resource: "jobdef"
description: "Decision tree for JobDefs: list, find, describe, score"
intents:
  list:
    exec:
      tool: "sas-score-list-jobdef"
      args:
        start: 1
        limit: 10
    format: "list of jobdefs"
  find:
    parse:
      name: "$name"
    exec:
      tool: "sas-score-find-jobdef"
      args:
        name: "$name"
    format: "find response"
  describe:
    parse:
      name: "$name"
    verify:
      tool: "sas-score-find-jobdef"
      args:
        name: "$name"
    exec:
      tool: "sas-score-jobdef-describe"
      args:
        name: "$name"
    format: "jobdef metadata and schema"
  score:
    parse:
      name: "$name"
      scenario: "$scenario"
    verify:
      tool: "sas-score-find-jobdef"
      args:
        name: "$name"
    exec:
      tool: "sas-score-score-jobdef"
      args:
        name: "$name"
        scenario: "$scenario"
    format: "jobdef run output"
